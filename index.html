<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TimeFlow</title>
<meta name="theme-color" content="#0D1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeFlow">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0D1117;color:#E6EDF3;font-family:'Roboto',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(59,166,118,.35)}70%{box-shadow:0 0 0 14px rgba(59,166,118,0)}100%{box-shadow:0 0 0 0 rgba(59,166,118,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(59,166,118,.2)}50%{box-shadow:0 0 16px rgba(59,166,118,.4)}}
.fade-in{animation:fadeIn .3s ease}
.slide-in{animation:slideIn .4s ease forwards}
.shimmer{background:linear-gradient(90deg,#21262D 25%,#30363D 50%,#21262D 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.cat-btn{transition:all .2s ease;cursor:pointer;border:none;text-align:left}
.cat-btn:active{transform:scale(.95)!important}
.hdr-btn{transition:all .2s;cursor:pointer;border:none}
.tab-bar{display:flex;gap:2px;overflow-x:auto}
.tab-btn{flex:1;padding:7px 0;border:none;border-radius:8px;font-size:10px;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s;min-width:44px;background:transparent;color:#8B949E}
.tab-btn.active{background:#21262D;color:#E6EDF3}
.log-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #161B22}
.edit-input{padding:10px 12px;background:#0D1117;border:1px solid #30363D;border-radius:8px;color:#E6EDF3;font-size:15px;font-family:'Roboto',sans-serif;outline:none;width:100%;text-align:center;min-height:44px}
.edit-input:focus{border-color:#4A9BD9}
.edit-panel{background:#161B22;border:1px solid #30363D;border-radius:12px;padding:16px;margin:6px 0 10px;animation:fadeIn .2s ease}
.edit-btn{padding:8px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s;min-height:44px}
.edit-btn:active{transform:scale(.95)}
.cat-select{padding:10px 12px;background:#0D1117;border:1px solid #30363D;border-radius:8px;color:#E6EDF3;font-size:14px;font-family:'Roboto',sans-serif;outline:none;min-height:44px}
.insight-btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;font-family:'Montserrat',sans-serif;transition:all .3s;cursor:pointer}
.setup-input{width:100%;padding:12px 14px;background:#161B22;border:1px solid #30363D;border-radius:10px;color:#E6EDF3;font-size:14px;font-family:'Roboto',sans-serif;outline:none}
.setup-input:focus{border-color:#3BA676}
</style>
</head>
<body>
<div id="app">Loading TimeFlow...</div>
<script>
// ════════════════════════════════════════════
// TimeFlow v6 — iPhone Safari Compatible
// ════════════════════════════════════════════

// Safe emoji references (avoid ZWJ issues in template strings)
var CATS = [
  {id:"family", em:"\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC67\u200D\uD83D\uDC66", color:"#E8A838", target:3},
  {id:"work",   em:"\uD83D\uDCBC", color:"#7C6FAF", target:8},
  {id:"self",   em:"\uD83E\uDDD8", color:"#3BA676", target:2},
  {id:"partner",em:"\uD83D\uDC9B", color:"#E0637C", target:2},
  {id:"friends",em:"\uD83E\uDD1D", color:"#4A9BD9", target:1},
  {id:"sleep",  em:"\uD83D\uDE34", color:"#6B7B8D", target:8}
];

var L = {
  en:{
    family:"Family/Kids",work:"Work",self:"Self/Me-time",partner:"Partner",friends:"Friends",sleep:"Sleep",
    track:"Track",today:"Today",week:"Week",trend:"Trend",log:"Log",insights:"AI",
    trackedToday:"tracked today",tapStart:"Tap to start. Tap again to stop. Tap another to switch.",
    target:"target",todayBreak:"Today's Breakdown",startTracking:"Start tracking to see breakdown",
    weekTrend:"7-Day Trend",trackDays:"Track a few days to see trends",todayVsTarget:"Today vs Target",
    activityLog:"Activity Log",clearAll:"Clear All",live:"LIVE",started:"Started",
    noLogs:"No logs yet. Start tracking!",aiInsights:"AI Coach",getInsights:"Get Deep Analysis",
    analyzing:"Thinking...",insightsDesc:"AI monitors your patterns and suggests improvements",
    clearConfirm:"Clear all tracking data?",
    actual:"Actual",targetLabel:"Target",weekSummary:"This Week at a Glance",
    setupTitle:"Setup AI Coach",setupDesc:"Enter your Anthropic API key to enable AI suggestions. Stored only on this device.",
    save:"Save",skip:"Skip",changeKey:"Change Key",aiActive:"AI On",aiOff:"AI Off",
    proactiveTitle:"AI Suggestion",lastChecked:"Last analyzed",autoTitle:"Pattern shift detected",
    editLog:"Edit",saveEdit:"Save",cancelEdit:"Cancel",deleteEntry:"Delete",
    startTime:"Start",endTime:"End",category:"Category",deleteConfirm:"Delete this entry?"
  },
  id:{
    family:"Keluarga/Anak",work:"Kerja",self:"Waktu Sendiri",partner:"Pasangan",friends:"Teman",sleep:"Tidur",
    track:"Lacak",today:"Hari Ini",week:"Minggu",trend:"Tren",log:"Catatan",insights:"AI",
    trackedToday:"terlacak hari ini",tapStart:"Ketuk untuk mulai. Ketuk lagi untuk stop. Ketuk lain untuk ganti.",
    target:"target",todayBreak:"Ringkasan Hari Ini",startTracking:"Mulai tracking untuk lihat ringkasan",
    weekTrend:"Tren 7 Hari",trackDays:"Tracking beberapa hari untuk lihat tren",todayVsTarget:"Hari Ini vs Target",
    activityLog:"Catatan Aktivitas",clearAll:"Hapus Semua",live:"LIVE",started:"Mulai",
    noLogs:"Belum ada catatan. Mulai tracking!",aiInsights:"AI Coach",getInsights:"Analisis Mendalam",
    analyzing:"Berpikir...",insightsDesc:"AI memantau pola waktumu dan memberi saran perbaikan",
    clearConfirm:"Hapus semua data tracking?",
    actual:"Aktual",targetLabel:"Target",weekSummary:"Ringkasan Minggu Ini",
    setupTitle:"Setup AI Coach",setupDesc:"Masukkan API key Anthropic. Hanya disimpan di device ini.",
    save:"Simpan",skip:"Lewati",changeKey:"Ganti Key",aiActive:"AI Aktif",aiOff:"AI Mati",
    proactiveTitle:"Saran AI",lastChecked:"Terakhir",autoTitle:"Pola berubah",
    editLog:"Edit",saveEdit:"Simpan",cancelEdit:"Batal",deleteEntry:"Hapus",
    startTime:"Mulai",endTime:"Selesai",category:"Kategori",deleteConfirm:"Hapus catatan ini?"
  }
};

var SK = "timeflow-v4";
var NUDGE_MS = 7200000;
var AI_CD = 1800000;
var PAT_INT = 60000;

var st, cv, il, it, ait, aitt, psd, ee, chts, trf;

function init() {
  st = lds();
  cv = "tracker";
  il = false;
  it = st.aiSuggestion || null;
  aitt = st.aiSuggestionTime || null;
  psd = false;
  ee = null;
  chts = {};
  trf = {period:"30", catId:"all"};
}

function lds() {
  try { var r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return {days:{}, activeSession:null, lang:"en", apiKey:"", aiSuggestion:null, aiSuggestionTime:null, lastPS:null};
}
function svs() { try { localStorage.setItem(SK, JSON.stringify(st)); } catch(e) {} }

var td = function() { return new Date().toISOString().slice(0,10); };
var tt = function() { return L[st.lang || "en"]; };
var cl = function(id) { return tt()[id] || id; };

function fd(s) {
  if (!s || s < 0) return "0m";
  var h = Math.floor(s/3600);
  var m = Math.floor((s%3600)/60);
  return h > 0 ? h+"h "+m+"m" : m+"m";
}
function ft(ts) { return new Date(ts).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
function fti(ts) { var d=new Date(ts); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
function dn(ds) { return new Date(ds+"T12:00:00").toLocaleDateString(st.lang==="id"?"id-ID":"en",{weekday:"short"}); }
function l7() { var d=[]; for(var i=6;i>=0;i--){var x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().slice(0,10));} return d; }
function fta(ts) {
  if(!ts) return "";
  var diff = Math.floor((Date.now()-ts)/60000);
  if(diff<1) return st.lang==="id"?"baru saja":"just now";
  if(diff<60) return diff+"m "+(st.lang==="id"?"lalu":"ago");
  return Math.floor(diff/60)+"h "+(st.lang==="id"?"lalu":"ago");
}

function gt(ds) {
  var tot = {};
  var i;
  for(i=0;i<CATS.length;i++) tot[CATS[i].id] = 0;
  var dl = (st.days && st.days[ds]) ? st.days[ds] : [];
  for(i=0;i<dl.length;i++) tot[dl[i].category] = (tot[dl[i].category]||0) + dl[i].duration;
  if(st.activeSession) {
    var sd = new Date(st.activeSession.start).toISOString().slice(0,10);
    if(sd===ds) tot[st.activeSession.category] = (tot[st.activeSession.category]||0) + (Date.now()-st.activeSession.start)/1000;
  }
  return tot;
}

// ─── Actions ───
function tapCat(cid) {
  var now = Date.now();
  if(st.activeSession) {
    var sd = new Date(st.activeSession.start).toISOString().slice(0,10);
    var dur = (now - st.activeSession.start)/1000;
    if(!st.days[sd]) st.days[sd]=[];
    st.days[sd].push({category:st.activeSession.category, start:st.activeSession.start, end:now, duration:dur});
  }
  if(st.activeSession && st.activeSession.category===cid) { st.activeSession=null; }
  else { st.activeSession = {category:cid, start:now}; }
  svs(); render();
}

function togLang() { st.lang = st.lang==="en"?"id":"en"; svs(); render(); }
function clearAll() { if(confirm(tt().clearConfirm)){var lg=st.lang,k=st.apiKey;st={days:{},activeSession:null,lang:lg,apiKey:k,aiSuggestion:null,aiSuggestionTime:null,lastPS:null};it=null;aitt=null;svs();render();} }
function swV(v) { cv=v; ee=null; render(); }

function startEd(ds,idx) { ee={d:ds,i:idx}; render(); }
function cancelEd() { ee=null; render(); }
function saveEd() {
  if(!ee) return;
  var logs = st.days[ee.d]; if(!logs || !logs[ee.i]) return;
  var si = document.getElementById("edit-start");
  var ei = document.getElementById("edit-end");
  var ci = document.getElementById("edit-category");
  if(!si||!ei||!ci) return;
  var ol = logs[ee.i];
  var dp = new Date(ol.start).toISOString().slice(0,10);
  var sp = si.value.split(":"); var ep = ei.value.split(":");
  var ns = new Date(dp+"T"+("0"+sp[0]).slice(-2)+":"+("0"+sp[1]).slice(-2)+":00");
  var ne = new Date(dp+"T"+("0"+ep[0]).slice(-2)+":"+("0"+ep[1]).slice(-2)+":00");
  if(isNaN(ns.getTime())||isNaN(ne.getTime())) return;
  if(ne<=ns) { ne = new Date(ne.getTime() + 86400000); }
  logs[ee.i] = {category:ci.value, start:ns.getTime(), end:ne.getTime(), duration:(ne-ns)/1000};
  st.days[ee.d] = logs; ee=null; svs(); render();
}
function delEntry() {
  if(!ee) return; if(!confirm(tt().deleteConfirm)) return;
  if(st.days[ee.d]){st.days[ee.d].splice(ee.i,1); if(st.days[ee.d].length===0) delete st.days[ee.d];}
  ee=null; svs(); render();
}

// ─── AI ───
function saveKey() {
  var inp = document.getElementById("apiKeyInput");
  var v = inp ? inp.value.trim() : "";
  if(v) { st.apiKey=v; svs(); cv="insights"; render(); setTimeout(function(){callAI("manual");},300); }
}
function clearKey() { st.apiKey=""; svs(); render(); }
function skipSetup() { cv="tracker"; render(); }

function callAI(trigger) {
  if(!st.apiKey) { cv="insights"; render(); return; }
  il=true; it=null; render();
  var today=td(), days7=l7(), todayTot=gt(today);
  var todayStr=""; var weekStr="";
  var i,j;
  for(i=0;i<CATS.length;i++) todayStr+=CATS[i].id+": "+((todayTot[CATS[i].id]||0)/3600).toFixed(1)+"h (target "+CATS[i].target+"h)\n";
  for(i=0;i<days7.length;i++){var dt=gt(days7[i]);var row=days7[i]+": ";for(j=0;j<CATS.length;j++)row+=CATS[j].id+"="+((dt[CATS[j].id]||0)/3600).toFixed(1)+"h, ";weekStr+=row+"\n";}
  var hr = new Date().getHours();
  var isID = st.lang==="id";
  var prompt = isID
    ? "Kamu AI life coach personal. Analisis data tracking waktu pengguna (punya anak kecil). Max 3 poin, singkat, actionable, pakai emoji. Bahasa Indonesia santai. Max 120 kata. Tanpa heading markdown.\n\nHARI INI (jam "+hr+":00):\n"+todayStr+"\n7 HARI:\n"+weekStr
    : "You are a personal AI life coach. Analyze time tracking data (user has young kids). Max 3 points, short, actionable, use emoji. Warm tone. Max 120 words. No markdown headings.\n\nTODAY ("+hr+":00):\n"+todayStr+"\n7 DAYS:\n"+weekStr;

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":st.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:prompt}]})
  }).then(function(res){return res.json();}).then(function(data){
    if(data.content){
      var txt="";
      for(var k=0;k<data.content.length;k++){
        if(data.content[k].type==="text") txt+=(data.content[k].text||"");
      }
      it = txt || (isID?"Model tidak memberikan respons teks.":"Model returned no text response.");
    }
    else if(data.error){it="API Error: "+(data.error.message||JSON.stringify(data.error));}
    else{it=(isID?"Tidak ada respons. ":"No response. ")+JSON.stringify(data);}
    aitt=Date.now();st.aiSuggestion=it;st.aiSuggestionTime=aitt;il=false;svs();render();
  }).catch(function(e){
    it="Network/CORS Error: "+(e.message||e.toString());
    il=false;svs();render();
  });
}

// ─── Rule Alerts ───
function getAlerts() {
  var today=td(),tot=gt(today);
  var totalT=0; var i; for(i=0;i<CATS.length;i++)totalT+=tot[CATS[i].id]||0;
  if(totalT<1800) return [];
  var wH=tot.work/3600, sH=tot.sleep/3600, fH=tot.family/3600, meH=tot.self/3600;
  var hr=new Date().getHours(); var a=[]; var isID=st.lang==="id";
  if(isID){
    if(wH>9)a.push({msg:"Sudah kerja >9 jam. Istirahat!",color:"#E0637C"});
    else if(wH>7&&fH<0.5)a.push({msg:"Kerja lama, family time kurang.",color:"#E8A838"});
    if(sH<5&&hr>=22)a.push({msg:"Tidur kurang 5 jam. Jaga pola tidur!",color:"#6B7B8D"});
    if(meH<0.15&&wH>5)a.push({msg:"Belum ada me-time hari ini.",color:"#3BA676"});
  }else{
    if(wH>9)a.push({msg:"Over 9h of work. Take a break!",color:"#E0637C"});
    else if(wH>7&&fH<0.5)a.push({msg:"Long work, low family time.",color:"#E8A838"});
    if(sH<5&&hr>=22)a.push({msg:"Sleep deficit. Rest tonight!",color:"#6B7B8D"});
    if(meH<0.15&&wH>5)a.push({msg:"No me-time yet. Take 15 mins.",color:"#3BA676"});
  }
  return a.slice(0,2);
}

// ═══════════════════════════
// RENDER
// ═══════════════════════════
function render() {
  var app = document.getElementById("app");
  var today = td();
  var totals = gt(today);
  var totalSec = 0; var i; for(i=0;i<CATS.length;i++) totalSec += totals[CATS[i].id]||0;
  var t = tt();
  var alerts = getAlerts();
  var hasKey = !!st.apiKey;
  var dateStr = new Date().toLocaleDateString(st.lang==="id"?"id-ID":"en",{weekday:"long",month:"short",day:"numeric"});

  // Nudge
  var nudge = "";
  if(st.activeSession) {
    var elapsed = Date.now()-st.activeSession.start;
    if(elapsed>NUDGE_MS) {
      nudge = '<div style="margin:8px 20px 0;padding:10px 14px;background:#1a1510;border:1px solid #E8A83830;border-radius:12px;font-size:13px;color:#E8A838;animation:pulse 2s infinite">'+cl(st.activeSession.category)+' '+fd(elapsed/1000)+' - '+(st.lang==="id"?"Waktunya ganti?":"Time to switch?")+'</div>';
    }
  }

  // Alerts
  var alertH = "";
  if(alerts.length>0) {
    alertH = '<div style="padding:8px 20px 0;display:flex;flex-direction:column;gap:6px">';
    for(i=0;i<alerts.length;i++) {
      alertH += '<div class="slide-in" style="padding:8px 12px;background:'+alerts[i].color+'12;border:1px solid '+alerts[i].color+'33;border-radius:10px;font-size:12px;color:'+alerts[i].color+'">'+alerts[i].msg+'</div>';
    }
    alertH += '</div>';
  }

  // AI banner
  var aiB = "";
  if(it && aitt && !il && cv!=="insights") {
    var age = (Date.now()-aitt)/60000;
    if(age<120) {
      var prev = it.length>120 ? it.substring(0,120)+"..." : it;
      aiB = '<div onclick="swV(\'insights\')" style="margin:8px 20px 0;padding:10px 14px;background:#3BA67612;border:1px solid #3BA67633;border-radius:12px;cursor:pointer"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:6px;height:6px;border-radius:50%;background:#3BA676;animation:pulse 1.2s infinite"></div><span style="font-size:11px;font-weight:700;color:#3BA676;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.5px">'+t.proactiveTitle+'</span><span style="font-size:10px;color:#8B949E;margin-left:auto">'+fta(aitt)+'</span></div><div style="font-size:12px;color:#C9D1D9;line-height:1.4">'+prev+'</div></div>';
    }
  }

  var viewH = "";
  if(cv==="tracker") viewH = rTracker(totals,t);
  else if(cv==="daily") viewH = rDaily(totals,totalSec,t);
  else if(cv==="weekly") viewH = rWeekly(t);
  else if(cv==="trend") viewH = rTrend(t);
  else if(cv==="log") viewH = rLog(today,t);
  else if(cv==="insights") viewH = rInsights(t,hasKey);

  // Notif button
  var nBtn = '<button onclick="togNotif()" class="hdr-btn" style="padding:6px 10px;border-radius:20px;border:1px solid #30363D;background:#161B22;color:#8B949E;font-size:12px;font-weight:700;min-width:36px;min-height:32px;font-family:Montserrat,sans-serif">N</button>';
  try {
    if(typeof Notification !== "undefined" && Notification.permission === "granted") {
      nBtn = '<button onclick="togNotif()" class="hdr-btn" style="padding:6px 10px;border-radius:20px;border:1px solid #2D5A43;background:#14261E;color:#3BA676;font-size:12px;font-weight:700;min-width:36px;min-height:32px;font-family:Montserrat,sans-serif">N</button>';
    }
  } catch(e) {}

  app.innerHTML =
    '<div style="padding:16px 20px 10px;background:linear-gradient(180deg,#161B22,#0D1117);border-bottom:1px solid #21262D">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
        '<div><h1 style="margin:0;font-size:22px;font-weight:800;font-family:Montserrat,sans-serif;color:#3BA676">TimeFlow</h1><p style="margin:2px 0 0;font-size:11px;color:#8B949E">'+dateStr+'</p></div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<button onclick="togLang()" class="hdr-btn" style="padding:4px 9px;border-radius:20px;border:1px solid #30363D;background:#161B22;color:#C9D1D9;font-size:11px;font-weight:600;font-family:Montserrat,sans-serif">'+(st.lang==="en"?"ID":"EN")+'</button>' +
          nBtn +
          '<div style="text-align:right"><div style="font-size:18px;font-weight:700;font-family:Montserrat,sans-serif">'+fd(totalSec)+'</div><div style="font-size:9px;color:#8B949E;text-transform:uppercase;letter-spacing:1px">'+t.trackedToday+'</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="tab-bar">' +
        tBtn("tracker",t.track) + tBtn("daily",t.today) + tBtn("weekly",t.week) + tBtn("trend",t.trend) + tBtn("log",t.log) + tBtn("insights",t.insights+(hasKey?" *":"")) +
      '</div>' +
    '</div>' +
    alertH + nudge + aiB +
    '<div style="padding:14px 20px 100px">'+viewH+'</div>';
}

function tBtn(id,label) {
  return '<button onclick="swV(\''+id+'\')" class="tab-btn '+(cv===id?'active':'')+'">'+label+'</button>';
}

function togNotif() {
  try {
    if(typeof Notification === "undefined") {
      alert("Notifications not supported on this browser/device.");
      return;
    }
    if(Notification.permission === "granted") {
      alert(st.lang==="id"?"Notifikasi sudah aktif! Ubah di Settings > TimeFlow.":"Notifications already on! Change in Settings > TimeFlow.");
      new Notification("TimeFlow", {body: st.lang==="id"?"Notifikasi berfungsi!":"Notifications working!"});
    } else {
      Notification.requestPermission().then(function(result){
        if(result === "granted") {
          new Notification("TimeFlow", {body: st.lang==="id"?"Notifikasi aktif!":"Notifications enabled!"});
        } else {
          alert(st.lang==="id"?"Permission ditolak. Cek Settings > TimeFlow > Notifications.":"Permission denied. Check Settings > TimeFlow > Notifications.");
        }
        render();
      });
    }
  } catch(e) {
    alert("Notification error: " + e.message);

// ─── Trend ───
function setTrf(key,val){trf[key]=val;render();}

function trDates(){
  var now=new Date(),start=new Date();
  if(trf.period==="7"){start.setDate(now.getDate()-6);}
  else if(trf.period==="30"){start.setDate(now.getDate()-29);}
  else if(trf.period==="90"){start.setDate(now.getDate()-89);}
  else{
    var k=Object.keys(st.days||{}).sort();
    if(k.length){start=new Date(k[0]+"T12:00:00");}
    else{start.setDate(now.getDate()-29);}
  }
  var d=[],cur=new Date(start);
  now.setHours(23,59,59,999);
  while(cur<=now){d.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  return d;
}

function trGroups(dates){
  if(dates.length<=31) return dates.map(function(d){return{label:d.slice(5),dates:[d]};});
  var groups=[];
  for(var i=0;i<dates.length;i++){
    var dow=new Date(dates[i]+"T12:00:00").getDay();
    if(groups.length===0||dow===1){groups.push({label:dates[i].slice(5),dates:[]});}
    groups[groups.length-1].dates.push(dates[i]);
  }
  return groups;
}

      if(isEd) {
        var opts="";for(var oi=0;oi<CATS.length;oi++){opts+='<option value="'+CATS[oi].id+'"'+(CATS[oi].id===log.category?' selected':'')+'>'+CATS[oi].em+' '+cl(CATS[oi].id)+'</option>';}
        h+='<div class="edit-panel"><div style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;align-items:center;gap:10px"><label style="font-size:11px;color:#8B949E;min-width:50px">'+t.category+'</label><select id="edit-category" class="cat-select" style="flex:1">'+opts+'</select></div><div style="display:flex;align-items:center;gap:10px"><label style="font-size:11px;color:#8B949E;min-width:50px">'+t.startTime+'</label><input id="edit-start" type="time" class="edit-input" style="flex:1" value="'+fti(log.start)+'"></div><div style="display:flex;align-items:center;gap:10px"><label style="font-size:11px;color:#8B949E;min-width:50px">'+t.endTime+'</label><input id="edit-end" type="time" class="edit-input" style="flex:1" value="'+fti(log.end)+'"></div></div><div style="display:flex;gap:8px;margin-top:14px"><button onclick="saveEd()" class="edit-btn" style="flex:1;background:#3BA676;color:#fff">'+t.saveEdit+'</button><button onclick="cancelEd()" class="edit-btn" style="flex:1;background:#21262D;color:#8B949E">'+t.cancelEdit+'</button><button onclick="delEntry()" class="edit-btn" style="background:#21262D;color:#F85149;min-width:44px">X</button></div></div>';
      } else {
        h+='<div class="log-row"><div style="width:32px;height:32px;border-radius:8px;background:'+cat.color+'18;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+cat.em+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:#C9D1D9;font-family:Montserrat,sans-serif">'+cl(cat.id)+'</div><div style="font-size:11px;color:#8B949E">'+ft(log.start)+' - '+ft(log.end)+'</div></div><div style="font-size:13px;font-weight:700;font-family:Montserrat,sans-serif;color:'+cat.color+'">'+fd(log.duration)+'</div><button onclick="startEd(\''+ds+'\','+li+')" class="edit-btn" style="background:#21262D;color:#8B949E;font-size:14px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">Ed</button></div>';
      }
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function rInsights(t,hasKey) {
  var statusC = hasKey?"#3BA676":"#484F58";
  var statusT = hasKey?t.aiActive:t.aiOff;
  var h='<div class="fade-in">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><h2 style="font-size:16px;font-weight:700;margin:0;font-family:Montserrat,sans-serif">'+t.aiInsights+'</h2><div style="font-size:11px;color:'+statusC+'">'+statusT+'</div></div>';
  h+='<p style="font-size:12px;color:#8B949E;margin:0 0 14px">'+t.insightsDesc+'</p>';
  if(hasKey) {
    h+='<button onclick="callAI(\'manual\')" '+(il?'disabled':'')+' class="insight-btn" style="background:'+(il?'#21262D':'linear-gradient(135deg,#3BA676,#4A9BD9)')+';cursor:'+(il?'wait':'pointer')+';opacity:'+(il?.7:1)+';margin-bottom:4px">'+(il?t.analyzing:t.getInsights)+'</button>';
    h+='<button onclick="clearKey()" style="width:100%;padding:8px;border:none;border-radius:8px;background:transparent;color:#484F58;font-size:11px;cursor:pointer;font-family:Montserrat,sans-serif">'+t.changeKey+'</button>';
  } else {
    h+='<div style="text-align:center;margin:20px 0"><div style="font-size:40px;margin-bottom:8px">&#x1F916;</div><h3 style="font-size:16px;font-weight:700;font-family:Montserrat,sans-serif;margin-bottom:6px">'+t.setupTitle+'</h3><p style="font-size:13px;color:#8B949E;margin-bottom:16px">'+t.setupDesc+'</p></div>';
    h+='<input id="apiKeyInput" type="password" class="setup-input" placeholder="sk-ant-api03-..." style="margin-bottom:12px">';
    h+='<button onclick="saveKey()" class="insight-btn" style="background:linear-gradient(135deg,#3BA676,#4A9BD9);margin-bottom:8px">'+t.save+'</button>';
    h+='<button onclick="skipSetup()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#21262D;color:#8B949E;font-size:13px;font-family:Montserrat,sans-serif;cursor:pointer">'+t.skip+'</button>';
  }
  if(il) {
    h+='<div style="margin-top:16px;display:flex;flex-direction:column;gap:10px"><div class="shimmer" style="height:14px;width:85%"></div><div class="shimmer" style="height:14px;width:100%"></div><div class="shimmer" style="height:14px;width:65%"></div></div>';
  } else if(it) {
    h+='<div class="fade-in" style="margin-top:16px;padding:16px 18px;background:#161B22cc;border:1px solid #30363D;border-radius:14px;font-size:13.5px;line-height:1.7;color:#C9D1D9;white-space:pre-wrap">'+it+'</div>';
    if(aitt) h+='<div style="margin-top:6px;font-size:10px;color:#484F58;text-align:right">'+t.lastChecked+': '+fta(aitt)+'</div>';
  }
  var days=l7();var wt={};var dwd=0;var i,j;
  for(i=0;i<CATS.length;i++)wt[CATS[i].id]=0;
  for(i=0;i<days.length;i++){var dt=gt(days[i]);var any=false;for(j=0;j<CATS.length;j++){wt[CATS[j].id]+=(dt[CATS[j].id]||0);if(dt[CATS[j].id]>0)any=true;}if(any)dwd++;}
  var div=Math.max(dwd,1);
  h+='<div style="margin-top:20px;padding:14px;background:#161B22;border-radius:12px;border:1px solid #21262D">';
  h+='<div style="font-size:11px;font-weight:700;color:#8B949E;margin-bottom:10px;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:1px">'+t.weekSummary+'</div>';
  for(j=0;j<CATS.length;j++){
    var c=CATS[j];var avg=wt[c.id]/div/3600;var diff=avg-c.target;var ds2=diff>=0?"+"+diff.toFixed(1):diff.toFixed(1);
    var dc=Math.abs(diff)<.5?"#3BA676":(c.id==="work"&&diff>0)?"#E0637C":diff>0?"#3BA676":"#E8A838";
    h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><span style="font-size:16px">'+c.em+'</span><span style="flex:1;font-size:12px;color:#C9D1D9">'+cl(c.id)+'</span><span style="font-size:12px;font-weight:600;font-family:Montserrat,sans-serif;color:#8B949E">'+avg.toFixed(1)+'h/d</span><span style="font-size:11px;font-weight:700;font-family:Montserrat,sans-serif;color:'+dc+';min-width:42px;text-align:right">'+ds2+'h</span></div>';
  }
  h+='</div>';
  h+='<div style="margin-top:16px;padding:12px;background:#161B2280;border-radius:10px;border:1px solid #21262D"><p style="font-size:11px;color:#484F58;line-height:1.5;margin:0">'+(st.lang==="id"?"API key hanya di device ini.":"API key stored only on this device.")+'</p></div>';
  h+='</div>';
  return h;
}
